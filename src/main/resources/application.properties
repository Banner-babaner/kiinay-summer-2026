spring.application.name=vorstu

spring.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driverClassName = org.postgresql.Driver

spring.datasource.url=jdbc:postgresql://localhost:5432/test
spring.datasource.username=postgres
spring.datasource.password=123456

spring.jpa.hibernate.ddl-auto=validate

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

spring.security.user.name=sergey
spring.security.user.password=sergey
spring.security.user.roles=manager

jwt.secret=ShadowFrogShadeOfRockShapeOfRoadShareMyBotShmebulock
jwt.access.expiration=86400000
jwt.refresh.expiration=604800000


spring.main.allow-circular-references=true

app.invite.live-seconds=3600
app.invite.message=You got a time-live link for connection to our community
app.invite.endpoint=http://localhost:8080/api/auth/invites/


spring.mail.host=mailhog
spring.mail.port=1025
spring.mail.username=dummy
spring.mail.password=dummy
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false


spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=email-error-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

#kafka/worker/none
app.mail.error-handler=kafka
app.mail.error-handler.worker.sleep-millis=10000
app.mail.error-handler.retry-count=3

app.exception-orbitr.enable=true